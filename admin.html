<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PANEL - BIDAN LULU</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00a8ff; --success: #2ed573; --danger: #ff4757; --dark: #0b0e11; --card: #1c1f23; --gold: #d4af37; }
        * { box-sizing: border-box; outline: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: #fff; padding: 0; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* --- STYLING HALAMAN LOGIN PIN (MEWAH & CANTIK) --- */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid var(--gold); }
        #login-screen.hidden { transform: translateY(-100%); }
        
        /* Bingkai Mewah Berkilau */
        .login-box { background: rgba(28, 31, 35, 0.9); padding: 40px; border-radius: 30px; border: 2px solid var(--gold); box-shadow: 0 0 50px rgba(212, 175, 55, 0.3); text-align: center; max-width: 320px; position: relative; overflow: hidden; }
        .login-box::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(212, 175, 55, 0.1), transparent); animation: shine 3s infinite; }
        @keyframes shine { 0% { transform: translateX(-100%) translateY(-100%); } 100% { transform: translateX(100%) translateY(100%); } }

        /* Gambar Logo Emas */
        .gold-logo { width: 80px; height: 80px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 40px; color: #000; font-weight: 800; box-shadow: 0 0 20px var(--gold); border: 4px solid #fff; }
        
        .login-title { font-weight: 800; text-transform: uppercase; color: #fff; letter-spacing: 2px; font-size: 16px; margin-bottom: 25px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        /* Input PIN Mewah */
        .pin-input-group { position: relative; margin-bottom: 20px; }
        #pin-field { width: 100%; padding: 18px 20px; background: #000; border: 2px solid #444; border-radius: 15px; color: var(--gold); font-size: 24px; font-weight: 800; letter-spacing: 8px; text-align: center; transition: 0.3s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8); }
        #pin-field:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.5), inset 0 2px 4px rgba(0,0,0,0.8); }
        
        .btn-login { width: 100%; padding: 18px; background: linear-gradient(45deg, var(--gold), #f9e498); border: none; border-radius: 15px; color: #000; font-weight: 800; text-transform: uppercase; font-size: 14px; cursor: pointer; transition: 0.3s; letter-spacing: 1px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-login:active { transform: scale(0.97); box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        /* Animasi Salah PIN */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
        .error-shake { animation: shake 0.5s; border-color: var(--danger) !important; box-shadow: 0 0 20px rgba(255, 71, 87, 0.5) !important; }

        /* --- STYLING HALAMAN ADMIN (TETAP SAMA, TIDAK DIAK-ACAK) --- */
        #admin-main-content { width: 100%; max-width: 400px; padding: 20px; display: none; overflow-y: auto; height: 100vh; }
        h2.admin-title { color: var(--primary); text-align: center; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 2px; }
        
        .card { background: var(--card); padding: 20px; border-radius: 25px; margin-bottom: 15px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: #444; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        label { display: block; font-size: 10px; font-weight: 800; color: #888; margin-bottom: 10px; text-transform: uppercase; text-align: left; }
        
        /* 1. DAFTAR TUNGGU */
        #list-antrean { margin-top: 5px; text-align: left; max-height: 180px; overflow-y: auto; padding-right: 5px; }
        #list-antrean::-webkit-scrollbar { width: 5px; }
        #list-antrean::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
        .item-pasien { padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 8px; border-left: 4px solid var(--primary); font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }

        /* 2. BUKA TUTUP */
        select { width: 100%; padding: 16px; border-radius: 15px; background: #2c3139; color: #fff; border: 1px solid #444; font-weight: 700; outline: none; cursor: pointer; -webkit-appearance: none; }

        /* 3. TOMBOL PANGGIL */
        .btn-call { background: var(--success); color: #fff; height: 90px; font-size: 18px; box-shadow: 0 10px 20px rgba(46, 213, 115, 0.2); border: 2px solid #1ba95a; }

        /* 4. KOTAK INFO */
        textarea { 
            width: 100%; padding: 15px; border-radius: 18px; background: #2c3139; color: #fff; 
            border: 2px solid #444; font-weight: 700; font-family: inherit; font-size: 14px;
            line-height: 1.5; min-height: 110px; outline: none; resize: none;
        }
        textarea:focus { border-color: var(--primary); }

        .btn { width: 100%; padding: 18px; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.2s; }
        .btn:active { transform: scale(0.97); }
        .btn-update { background: var(--primary); color: #fff; font-size: 13px; }
        
        /* 5. RESET DATA */
        .btn-reset { background: none; color: var(--danger); border: none; text-decoration: underline; font-size: 11px; width: 100%; margin-top: 20px; cursor: pointer; opacity: 0.5; font-weight: 700; display: block; text-align: center; }
        .btn-reset:hover { opacity: 1; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div class="gold-logo">L</div> <div class="login-title">Akses Admin Bidan Lulu</div>
        
        <div class="pin-input-group">
            <input type="password" id="pin-field" maxlength="4" placeholder="••••" inputmode="numeric">
        </div>
        
        <button class="btn-login" onclick="cekPinHalamanDepan()">Buka Panel</button>
    </div>
</div>


<div id="admin-main-content">
    <h2 class="admin-title">ADMIN PANEL</h2>

    <div class="card">
        <label>DAFTAR ANTRIAN</label>
        <div id="list-antrean">Memuat antrean...</div>
    </div>

    <div class="card">
        <label>STATUS KLINIK</label>
        <select id="status-set">
            <option value="BUKA">🟢 KLINIK BUKA</option>
            <option value="TUTUP">🔴 KLINIK TUTUP</option>
        </select>
        <button class="btn btn-update" onclick="setStatus()">SIMPAN STATUS</button>
    </div>

    <div class="card">
        <label>PANGGIL PASIEN</label>
        <button class="btn btn-call" onclick="panggilPasienSaku()">PANGGIL BERIKUTNYA 🔊</button>
    </div>

    <div class="card">
        <label>INFO KLINIK</label>
        <textarea id="input-info" placeholder="Ketik info di sini..."></textarea>
        <button class="btn btn-update" onclick="updateInfoHalamanDepan()">UPDATE INFO KE PASIEN</button>
    </div>

    <button class="btn-reset" onclick="resetDataSaku()">RESET SEMUA DATA</button>
</div>


<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCRGwnp5R1qLXGRW4B0LMB_ko5c8O2DNDU", 
        authDomain: "klinik-ace97.firebaseapp.com", 
        databaseURL: "https://klinik-ace97-default-rtdb.firebaseio.com", 
        projectId: "klinik-ace97", 
        storageBucket: "klinik-ace97.firebasestorage.app", 
        messagingSenderId: "758250150131", 
        appId: "1:758250150131:web:b00a0f4bd7e9dde4797f86" 
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- LOGIKA LOGIN PIN MEWAH ---
    const ADMIN_PIN_RAHASIA = "1234"; // Ganti '1234' dengan PIN kemauanmu

    window.cekPinHalamanDepan = function() {
        const pinField = document.getElementById('pin-field');
        const inputPin = pinField.value;

        if (inputPin === ADMIN_PIN_RAHASIA) {
            // PIN Benar, hilangkan layar login, munculkan admin
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-main-content').style.display = 'block';
            pinField.value = ""; // Bersihkan
        } else {
            // PIN Salah, kasih animasi bergetar merah
            pinField.classList.add('error-shake');
            pinField.value = ""; 
            setTimeout(() => pinField.classList.remove('error-shake'), 500);
        }
    };

    // Support klik 'Enter' di keyboard/hp untuk login
    document.getElementById('pin-field').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') cekPinHalamanDepan();
    });


    // --- LOGIKA ADMIN UTAMA (FIX ERROR & STABIL) ---

    // 1. Tampilkan Daftar (Realtime)
    onValue(ref(db, 'queue'), (s) => {
        const div = document.getElementById('list-antrean');
        if(!s.exists()) { div.innerHTML = "<i>Antrean kosong...</i>"; return; }
        div.innerHTML = "";
        s.forEach(item => {
            const p = item.val();
            div.innerHTML += `<div class="item-pasien"><span><b>${p.nomor.toString().padStart(2, '0')}</b>. ${p.nama}</span></div>`;
        });
    });

    // 2. Simpan Status
    window.setStatus = function() {
        const st = document.getElementById('status-set').value;
        set(ref(db, 'config/status'), st).then(() => alert("Status Klinik Berhasil Diperbarui!"));
    };

    // 3. Panggil Pasien (Fix Error Baris 153)
    window.panggilPasienSaku = function() {
        get(ref(db, 'queue')).then(s => { 
            if(s.exists()){ 
                const data = s.val();
                const keys = Object.keys(data);
                const firstKey = keys[0]; // Ambil antrean paling atas
                const nextPatientData = data[firstKey];

                // Set ke 'active' untuk trigger suara di HP Pasien
                set(ref(db, 'active'), {
                    ...nextPatientData,
                    time: Date.now() // Trigger suara unik
                }).then(() => {
                    // Hapus dari daftar tunggu sesudahnya
                    remove(ref(db, 'queue/' + firstKey)); 
                });
            } else { alert("Daftar tunggu sudah habis."); }
        });
    };

    // 4. Update Info
    window.updateInfoHalamanDepan = function() {
        const teks = document.getElementById('input-info').value;
        set(ref(db, 'config/info'), teks).then(() => alert("Info Berhasil Di-update ke HP Pasien!"));
    };

    // 5. Reset Data
    window.resetDataSaku = function() {
        if(confirm("Yakin ingin menghapus semua data? Nomor antrean akan kembali ke awal.")) {
            remove(ref(db)).then(() => location.reload());
        }
    };

    // Ambil data status awal untuk select option
    get(ref(db, 'config/status')).then((s) => {
        if(s.exists()) document.getElementById('status-set').value = s.val();
    });
</script>

</body>
</html>
