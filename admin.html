<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANEL ADMIN - BIDAN LULU</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00a8ff; --success: #2ed573; --danger: #ff4757; --dark: #1c1f23; }
        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b0e11; color: #fff; padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 400px; }
        h2 { text-align: center; color: var(--primary); letter-spacing: 1px; margin-bottom: 25px; }
        
        .card { background: var(--dark); padding: 20px; border-radius: 25px; margin-bottom: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .card label { font-size: 10px; color: #888; font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 8px; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-call { background: var(--success); color: #fff; font-size: 18px; height: 90px; box-shadow: 0 10px 20px rgba(46, 213, 115, 0.3); }
        .btn-update { background: var(--primary); color: #fff; font-size: 13px; }
        
        input, select { width: 100%; padding: 15px; border-radius: 15px; background: #2c3139; color: #fff; border: 1px solid #444; font-weight: 700; font-family: inherit; margin-top: 5px; }
        
        #admin-list { margin-top: 15px; font-size: 14px; }
        .list-item { padding: 10px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        
        .reset-link { color: var(--danger); background: none; border: none; width: 100%; text-decoration: underline; font-size: 11px; margin-top: 25px; cursor: pointer; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="container">
        <h2>ADMIN CONTROL</h2>
        
        <div class="card">
            <label>Navigasi Antrean</label>
            <button class="btn btn-call" onclick="panggilBerikutnya()">PANGGIL BERIKUTNYA 🔊</button>
        </div>

        <div class="card">
            <label>Status Operasional</label>
            <select id="set-status">
                <option value="BUKA">🟢 KLINIK BUKA</option>
                <option value="TUTUP">🔴 KLINIK TUTUP</option>
            </select>
            <button class="btn btn-update" onclick="simpanStatus()">UPDATE STATUS</button>
        </div>

        <div class="card">
            <label>Info / Pengumuman</label>
            <input type="text" id="input-info" placeholder="Contoh: Istirahat 15 menit...">
            <button class="btn btn-update" style="background:#636e72;" onclick="simpanInfo()">UPDATE</button>
        </div>

        <div class="card">
            <label>Pasien Menunggu</label>
            <div id="admin-list">Memuat antrean...</div>
        </div>

        <button class="reset-link" onclick="resetData()">RESET SEMUA DATA HARI INI</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        // CONFIG FIREBASE KAMU
        const firebaseConfig = { 
            apiKey: "AIzaSyCRGwnp5R1qLXGRW4B0LMB_ko5c8O2DNDU", 
            authDomain: "klinik-ace97.firebaseapp.com", 
            databaseURL: "https://klinik-ace97-default-rtdb.firebaseio.com", 
            projectId: "klinik-ace97", 
            storageBucket: "klinik-ace97.firebasestorage.app", 
            messagingSenderId: "758250150131", 
            appId: "1:758250150131:web:b00a0f4bd7e9dde4797f86" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // FUNGSI ADMIN
        window.simpanStatus = () => {
            const val = document.getElementById('set-status').value;
            set(ref(db, 'config/status'), val).then(() => alert("Status berhasil diubah!"));
        };

        window.simpanInfo = () => {
            const val = document.getElementById('input-info').value;
            set(ref(db, 'config/info'), val).then(() => alert("Info berhasil diperbarui!"));
        };

        window.panggilBerikutnya = () => {
            get(ref(db, 'queue')).then((s) => {
                if(!s.exists()) return alert("Antrean sudah habis, Ri!");
                const data = s.val(); 
                const key = Object.keys(data)[0]; 
                const nextPatient = data[key];
                
                // Set pasien aktif
                set(ref(db, 'active'), nextPatient).then(() => {
                    // Hapus dari daftar tunggu
                    remove(ref(db, 'queue/' + key));
                });
            });
        };

        window.resetData = () => {
            if(confirm("Yakin mau hapus semua data antrean? Pasien bakal balik ke nomor 0.")) {
                remove(ref(db)).then(() => location.reload());
            }
        };

        // UPDATE LIST ANTREAN SECARA REALTIME
        onValue(ref(db, 'queue'), (s) => {
            const listDiv = document.getElementById('admin-list');
            if(!s.exists()) {
                listDiv.innerHTML = "<i style='color:#666'>Tidak ada antrean...</i>";
                return;
            }
            listDiv.innerHTML = "";
            s.forEach((item) => {
                const p = item.val();
                listDiv.innerHTML += `<div class="list-item"><span><b>${p.nomor}</b>. ${p.nama}</span></div>`;
            });
        });
    </script>
</body>
</html>
