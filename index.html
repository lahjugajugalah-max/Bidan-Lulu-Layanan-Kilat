<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff6b6b, #ffb3b3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            text-align: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.5);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        p {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .highlight {
            font-weight: bold;
            color: #ffeaa7;
            font-size: 22px;
        }

        .loading {
            margin-top: 20px;
            font-size: 16px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚧 Website Sedang Maintenance</h1>
    <p>Mohon maaf, website sedang dalam perbaikan.</p>
    <p class="highlight">Segerakan datang ke Klinik Bidan Lulu yang bagus ❤️</p>
    <div class="loading">Silakan kembali lagi nanti...</div>
</div>

</body>
</html>
