<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASIEN - BIDAN LULU</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0984e3; --accent: #74b9ff; --bg: #f0f7ff; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 100%); margin: 0; padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .card { background: rgba(255, 255, 255, 0.98); border-radius: 40px; padding: 35px; width: 100%; max-width: 420px; box-shadow: 0 30px 60px rgba(0,0,0,0.15); text-align: center; border: 2px solid #fff; }
        .logo { font-weight: 800; font-size: 22px; color: var(--primary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* NOMOR LIVE HD */
        .nomor-waits { font-size: 110px; font-weight: 900; color: var(--primary); line-height: 1; margin: 15px 0; text-shadow: 4px 4px 0px rgba(116, 185, 255, 0.2); }
        
        .input-group { text-align: left; margin-top: 25px; }
        label { font-size: 12px; font-weight: 800; color: var(--primary); margin-left: 10px; display: block; margin-bottom: 8px; }
        
        /* KOTAK OPSI BIRU KHAS (HD & BOLD) */
        select, input { 
            width: 100%; padding: 20px; border-radius: 25px; border: 3px solid #74b9ff; 
            background: #e1f5fe; color: #0984e3; font-weight: 800; font-size: 16px; 
            outline: none; transition: 0.4s; appearance: none;
        }
        select:focus, input:focus { border-color: #00cec9; background: #fff; transform: scale(1.02); }
        
        .btn-daftar { 
            width: 100%; padding: 22px; border: none; border-radius: 25px; 
            background: linear-gradient(45deg, #0984e3, #6c5ce7); 
            color: #fff; font-weight: 800; font-size: 18px; margin-top: 30px; 
            cursor: pointer; box-shadow: 0 15px 30px rgba(9, 132, 227, 0.4); 
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">KLINIK BIDAN LULU</div>
        <div style="font-size: 11px; color: #888; font-weight: 800;">SEKARANG DILAYANI:</div>
        <div class="nomor-waits" id="nomor-live">00</div>
        <div id="nama-live" style="font-weight: 800; font-size: 20px; color: #2d3436;">...</div>

        <div class="input-group">
            <label>PILIH JENIS LAYANAN</label>
            <select id="layanan-input">
                <option value="🤰 ANC">🤰 ANC (CEK HAMIL)</option>
                <option value="💉 IMUNISASI">💉 IMUNISASI</option>
                <option value="💊 KB">💊 KB</option>
                <option value="🤒 BEROBAT">🤒 BEROBAT</option>
                <option value="💬 KONSULTASI">💬 KONSULTASI</option>
            </select>
        </div>
        <div class="input-group">
            <label>NAMA LENGKAP</label>
            <input type="text" id="nama-input" placeholder="Tulis nama di sini...">
        </div>
        <button class="btn-daftar" onclick="daftarAntrian()">DAFTAR SEKARANG</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCRGwnp5R1qLXGRW4B0LMB_ko5c8O2DNDU", authDomain: "klinik-ace97.firebaseapp.com", databaseURL: "https://klinik-ace97-default-rtdb.firebaseio.com", projectId: "klinik-ace97", storageBucket: "klinik-ace97.firebasestorage.app", messagingSenderId: "758250150131", appId: "1:758250150131:web:b00a0f4bd7e9dde4797f86" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.daftarAntrian = async () => {
            const nama = document.getElementById('nama-input').value.toUpperCase().trim();
            const layanan = document.getElementById('layanan-input').value;
            if(!nama) return alert("Masukan Nama Dulu Ri!");

            const result = await runTransaction(ref(db, 'total'), (c) => (c || 0) + 1);
            if(result.committed) {
                const num = result.snapshot.val();
                const uniqueID = Date.now(); // Perbaikan Nomor 7 (ID Unik)
                await set(ref(db, `queue/${uniqueID}`), { nama, nomor: num, layanan, time: serverTimestamp() });
                alert("Nomor Antrean Anda: " + num);
                document.getElementById('nama-input').value = "";
            }
        };

        onValue(ref(db, 'active'), (s) => {
            if(s.exists()){
                document.getElementById('nomor-live').innerText = s.val().nomor.toString().padStart(2, '0');
                document.getElementById('nama-live').innerText = s.val().nama;
            }
        });
    </script>
</body>
</html>
